<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>DAILY GAUNTLET</title>
<link rel="icon" type="image/png" sizes="64x64" href="icon-64.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="theme-color" content="#07060f">
<meta property="og:title" content="DAILY GAUNTLET">
<meta property="og:description" content="Villa family duel. New maze every day. 3 runs. No mercy.">
<meta property="og:image" content="https://felixvilla-cell.github.io/gauntlet/og.png">
<meta property="og:url" content="https://felixvilla-cell.github.io/gauntlet/">
<meta name="twitter:card" content="summary_large_image">
<style>
  :root {
    --bg: #07060f;
    --panel: #100e1f;
    --cyan: #19e3ff;
    --magenta: #ff2ea6;
    --gold: #ffc93c;
    --ink: #e8e6ff;
    --dim: #8a86b8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); overflow: hidden; touch-action: none; }
  body {
    font-family: "Menlo", "Courier New", monospace;
    color: var(--ink);
    display: flex; align-items: center; justify-content: center;
    user-select: none; -webkit-user-select: none;
  }
  #stage { position: relative; }
  canvas { display: block; background: var(--bg); }
  /* CRT scanlines over everything */
  #stage::after {
    content: ""; position: absolute; inset: 0; pointer-events: none; z-index: 40;
    background: repeating-linear-gradient(0deg, rgba(255,255,255,.025) 0 1px, transparent 1px 3px);
  }
  .screen {
    position: absolute; inset: 0; z-index: 20;
    display: flex; flex-direction: column; align-items: center;
    padding: max(10px, env(safe-area-inset-top)) 16px max(12px, env(safe-area-inset-bottom));
    overflow-y: auto; background: var(--bg);
  }
  .hidden { display: none !important; }
  h1 {
    font-size: 22px; letter-spacing: 4px; margin: 4px 0 2px; text-align: center;
    color: var(--cyan); text-shadow: 0 0 12px var(--cyan), 0 0 40px rgba(25,227,255,.4);
  }
  h1 span { color: var(--magenta); text-shadow: 0 0 12px var(--magenta), 0 0 40px rgba(255,46,166,.4); }
  .date { color: var(--dim); font-size: 11px; letter-spacing: 2px; margin-bottom: 8px; }
  .gameline {
    color: var(--cyan); font-size: 11px; letter-spacing: 2px; margin: -4px 0 4px;
    text-shadow: 0 0 10px rgba(25,227,255,.45);
  }
  .twist {
    color: var(--gold); font-size: 11px; letter-spacing: 2px; margin: 0 0 8px;
    text-shadow: 0 0 10px rgba(255,201,60,.5);
  }
  .panel {
    width: 100%; max-width: 360px; background: var(--panel);
    border: 1px solid rgba(25,227,255,.25); border-radius: 10px;
    padding: 10px 14px; margin-bottom: 8px;
    box-shadow: 0 0 18px rgba(25,227,255,.08) inset;
  }
  .panel h2 { font-size: 11px; letter-spacing: 3px; color: var(--dim); margin-bottom: 10px; }
  .roster { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .roster button, .boosts button {
    background: #171430; border: 1px solid rgba(138,134,184,.35); border-radius: 8px;
    color: var(--ink); font: inherit; font-size: 14px; padding: 9px 6px; cursor: pointer;
    letter-spacing: 1px;
  }
  .roster button.sel, .boosts button.sel {
    border-color: var(--gold); color: var(--gold);
    box-shadow: 0 0 10px rgba(255,201,60,.45); text-shadow: 0 0 8px rgba(255,201,60,.6);
  }
  .boosts { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .boosts small { display: block; color: var(--dim); font-size: 9px; margin-top: 4px; letter-spacing: 0; }
  .board { width: 100%; font-size: 14px; }
  .board .row { display: flex; align-items: center; gap: 8px; padding: 3px 0; }
  .board .name { width: 76px; letter-spacing: 1px; }
  .board .bar-wrap { flex: 1; height: 12px; background: #171430; border-radius: 6px; overflow: hidden; }
  .board .bar { height: 100%; border-radius: 6px; background: linear-gradient(90deg, var(--cyan), var(--magenta)); box-shadow: 0 0 8px rgba(255,46,166,.6); }
  .board .pts { width: 62px; text-align: right; color: var(--gold); }
  .board .empty { color: var(--dim); }
  .streakline { color: var(--dim); font-size: 11px; margin-top: 8px; letter-spacing: 1px; min-height: 14px; }
  .weekline { color: var(--dim); font-size: 11px; margin-top: 4px; letter-spacing: 1px; }
  .champline { color: var(--gold); font-size: 11px; margin-top: 4px; letter-spacing: 1px;
    text-shadow: 0 0 8px rgba(255,201,60,.5); }
  .bigbtn {
    width: 100%; max-width: 360px; padding: 13px; margin-top: 2px;
    font: inherit; font-size: 20px; letter-spacing: 6px; cursor: pointer;
    color: #07060f; font-weight: bold; border: none; border-radius: 10px;
    background: linear-gradient(90deg, var(--cyan), var(--magenta));
    box-shadow: 0 0 22px rgba(255,46,166,.55);
  }
  .bigbtn:disabled { opacity: .35; box-shadow: none; cursor: default; }
  .subbtn {
    width: 100%; max-width: 360px; padding: 12px; margin-top: 10px;
    font: inherit; font-size: 13px; letter-spacing: 3px; cursor: pointer;
    color: var(--cyan); background: transparent;
    border: 1px solid rgba(25,227,255,.4); border-radius: 10px;
  }
  .runsleft { color: var(--dim); font-size: 12px; margin-top: 10px; letter-spacing: 2px; }
  .result-score {
    font-size: 44px; color: var(--gold); letter-spacing: 2px; margin: 6px 0;
    text-shadow: 0 0 16px rgba(255,201,60,.8), 0 0 50px rgba(255,201,60,.35);
  }
  .result-detail { color: var(--dim); font-size: 12px; line-height: 1.9; text-align: center; letter-spacing: 1px; }
  .toast {
    position: absolute; left: 50%; transform: translateX(-50%); bottom: 24px; z-index: 50;
    background: #171430; border: 1px solid var(--gold); color: var(--gold);
    padding: 10px 16px; border-radius: 8px; font-size: 12px; letter-spacing: 1px;
    opacity: 0; transition: opacity .3s; pointer-events: none; max-width: 90%;
  }
  .toast.show { opacity: 1; }
  .screen input {
    width: 100%; background: #171430; border: 1px solid rgba(138,134,184,.35); border-radius: 8px;
    color: var(--ink); font: inherit; font-size: 16px; padding: 12px; text-align: center; letter-spacing: 3px;
  }
  .newbest { color: var(--magenta); font-size: 13px; letter-spacing: 3px; margin-bottom: 2px;
    text-shadow: 0 0 10px rgba(255,46,166,.7); }
</style>
</head>
<body>
<div id="stage">
  <canvas id="game"></canvas>

  <!-- ROOM GATE (first launch only) -->
  <div id="roomgate" class="screen hidden">
    <h1>DAILY<span>GAUNTLET</span></h1>
    <p class="date">FAMILY DUEL // ENTER ROOM CODE</p>
    <div class="panel">
      <h2>ROOM CODE</h2>
      <input id="roomInput" placeholder="from Papa's text" autocapitalize="none" autocomplete="off">
    </div>
    <button class="bigbtn" id="roomGo">ENTER</button>
  </div>

  <!-- PIN GATE -->
  <div id="pingate" class="screen hidden">
    <h1>SECRET<span>PIN</span></h1>
    <p class="date" id="pinLabel"></p>
    <div class="panel">
      <h2 id="pinPrompt">SET YOUR SECRET 4-DIGIT PIN</h2>
      <input id="pinInput" inputmode="numeric" pattern="[0-9]*" maxlength="4" placeholder="0000" autocomplete="off">
    </div>
    <button class="bigbtn" id="pinGo">LOCK IT IN</button>
    <button class="subbtn" id="pinCancel">BACK</button>
  </div>

  <!-- HOME -->
  <div id="home" class="screen">
    <h1>DAILY<span>GAUNTLET</span></h1>
    <p class="date" id="homeDate"></p>
    <p class="gameline" id="homeGame"></p>
    <p class="twist" id="homeMod"></p>
    <div class="panel" id="playerPanel">
      <h2>WHO ARE YOU?</h2>
      <div class="roster" id="roster"></div>
    </div>
    <div class="panel">
      <h2>PICK ONE BOOST</h2>
      <div class="boosts" id="boosts"></div>
    </div>
    <div class="panel">
      <h2>TODAY'S DUEL</h2>
      <div class="board" id="board"><div class="row empty">loading scores...</div></div>
      <div class="streakline" id="streakline"></div>
      <div class="weekline" id="weekline"></div>
      <div class="champline" id="champline"></div>
    </div>
    <button class="bigbtn" id="runBtn">RUN</button>
    <div class="runsleft" id="runsLeft"></div>
  </div>

  <!-- RESULTS -->
  <div id="results" class="screen hidden">
    <h1>RUN<span>OVER</span></h1>
    <p class="date" id="resDate"></p>
    <div class="newbest hidden" id="newBest">NEW DAILY BEST</div>
    <div class="result-score" id="resScore">0</div>
    <div class="result-detail" id="resDetail"></div>
    <div class="panel" style="margin-top:12px">
      <h2>TODAY'S DUEL</h2>
      <div class="board" id="board2"></div>
    </div>
    <button class="bigbtn" id="againBtn">RUN AGAIN</button>
    <button class="subbtn" id="shareBtn">SHARE RESULT</button>
    <button class="subbtn" id="homeBtn">BACK</button>
  </div>

  <div class="toast" id="toast"></div>
</div>

<script src="config.js"></script>
<script>
"use strict";
/* ================= CONFIG / ROSTER ================= */
// GAUNTLET_CONFIG comes from config.js: { firebase: {projectId, apiKey}, room: "" }
const CFG = window.GAUNTLET_CONFIG || { firebase: null, room: "" };
// Same difficulty for everyone (Felix's call 2026-07-12 -- the auto handicap
// for the younger boys is retired; speed/mult stay as knobs if he changes
// his mind).
const ROSTER = [
  { id: "papa",   name: "PAPI",    speed: 1.00, mult: 1.00 },
  { id: "adelina",name: "ADELINA", speed: 1.00, mult: 1.00 },
  { id: "fd",     name: "FELIX D", speed: 1.00, mult: 1.00 },
  { id: "oliver", name: "OLIVER",  speed: 1.00, mult: 1.00 },
  { id: "gray",   name: "GRAYSON", speed: 1.00, mult: 1.00 },
];
const BOOSTS = [
  { id: "shield", name: "SHIELD", desc: "+1 hit" },
  { id: "magnet", name: "MAGNET", desc: "pulls coins" },
  { id: "slowmo", name: "SLO-MO", desc: "10% slower" },
];
const MAX_RUNS = 3, RUN_SECS = 90;

// Daily modifier: the date picks one twist for EVERYONE (separate seed stream
// from the maze layout, so adding mods never reshuffles the course).
const MODS = [
  { id: "classic", name: "CLASSIC",       desc: "no twist. pure gauntlet" },
  { id: "rush",    name: "COIN RUSH",     desc: "coins everywhere, worth double" },
  { id: "fog",     name: "FOG",           desc: "you only see whats near you" },
  { id: "mirror",  name: "MIRROR",        desc: "left is right, right is left" },
  { id: "turbo",   name: "TURBO",         desc: "faster maze, 25% score bonus" },
  { id: "drift",   name: "MOVING WALLS",  desc: "every wall slides around" },
  { id: "squeeze", name: "TIGHT SQUEEZE", desc: "narrow gaps, +250 finish bonus" },
];
const modIndexRaw = ds => Math.floor(mulberry32(seedFromDate(ds + "mod"))() * MODS.length);
function todayMod() {
  // Never the same twist two days running. Each day's pick dodges the
  // PREVIOUS day's effective pick, so replay the last 30 days from a fixed
  // offset -- cheap, and every device walks the same dates to the same answer.
  const d = new Date(); d.setDate(d.getDate() - 30);
  let prev = -1;
  for (let k = 0; k <= 30; k++) {
    const ds = `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}`;
    let i = modIndexRaw(ds);
    if (i === prev)
      i = (i + 1 + Math.floor(mulberry32(seedFromDate(ds + "mod2"))() * (MODS.length - 1))) % MODS.length;
    prev = i;
    d.setDate(d.getDate() + 1);
  }
  return MODS[prev];
}

/* ================= WEEKLY GAME ROTATION ================= */
// A different GAME each week (Felix: "new game every week"), from a fixed
// Monday anchor so every device agrees. Daily seeds, boosts, twists, PINs and
// the duel board all carry across games. Launch week (pre-anchor) = gauntlet.
const WEEK_ANCHOR = Date.UTC(2026, 6, 13);   // Mon Jul 13 2026 -> week 1
function weekIndex() {
  const now = new Date();
  const days = Math.floor((Date.UTC(now.getFullYear(), now.getMonth(), now.getDate()) - WEEK_ANCHOR) / 86400000);
  return Math.floor(days / 7) + 1;
}
// 4-game cycle (LASER GRID added 2026-07-14). Order keeps the live week
// stable: week 1 (Jul 13) stays tunnel, meteor Jul 20, laser debuts Jul 27,
// gauntlet returns Aug 3.
const GAME_ORDER = ["gauntlet", "tunnel", "meteor", "laser"];
const weekGame = () => {
  const forced = qs.get("game");            // ?game=tunnel -- testing/practice
  if (forced && GAMES[forced]) return GAMES[forced];
  return GAMES[GAME_ORDER[((weekIndex() % GAME_ORDER.length) + GAME_ORDER.length) % GAME_ORDER.length]];
};

/* ================= DAILY SEED ================= */
const today = () => {
  const d = new Date();
  return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}`;
};
const dateLabel = () => new Date().toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"}).toUpperCase();
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
const seedFromDate = s => { let h = 2166136261; for (const c of s) { h ^= c.charCodeAt(0); h = Math.imul(h, 16777619); } return h >>> 0; };

/* ================= LOCAL STATE ================= */
// Room + player resolve URL-first and live in MEMORY for the session;
// localStorage is only a convenience for the next visit. (v1 stored room only
// in localStorage -- one storage hiccup and every sync silently no-oped.)
const qs = new URLSearchParams(location.search);
let ROOM = (qs.get("room") || safeGet("g:room") || CFG.room || "").toLowerCase().trim();
if (qs.get("room")) safeSet("g:room", ROOM);
function safeGet(k) { try { return localStorage.getItem(k); } catch { return null; } }
function safeSet(k, v) { try { localStorage.setItem(k, v); } catch {} }
const store = {
  get room()   { return ROOM; },
  set room(v)  { ROOM = v; safeSet("g:room", v); },
  get player() { return safeGet("g:player") || ""; },
  set player(v){ safeSet("g:player", v); },
  day(k, v) {
    const key = `g:${today()}:${store.player}:${k}`;
    if (v === undefined) return localStorage.getItem(key);
    localStorage.setItem(key, v);
  },
};
const runsUsed = () => parseInt(store.day("runs") || "0", 10);
const bestToday = () => parseInt(store.day("best") || "0", 10);

/* ================= CANVAS / SIZING ================= */
const W = 400, H = 700;
const cv = document.getElementById("game"), cx = cv.getContext("2d");
function fit() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const scale = Math.min(innerWidth / W, innerHeight / H);
  cv.style.width = W * scale + "px"; cv.style.height = H * scale + "px";
  cv.width = W * dpr; cv.height = H * dpr;
  cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  document.getElementById("stage").style.width = cv.style.width;
  document.getElementById("stage").style.height = cv.style.height;
}
addEventListener("resize", fit); fit();

/* ================= GAME ================= */
const G = {
  running: false, t: 0, lastTs: 0,
  px: W/2, targetX: W/2, hearts: 3, inv: 0, shake: 0,
  coins: 0, obstacles: [], coinDots: [], sparks: [], floaters: [],
  speedScale: 1, mult: 1, boost: "", slow: 1, magnet: false,
  rng: null, nextBarY: 0, barCount: 0, finished: false,
  // risk-reward layer (2026-07-14 "not hard or fun enough" pass)
  combo: 0, bestCombo: 0, coinPts: 0, grazePts: 0, grazes: 0, grazeTimer: 0,
};
const comboTier = () => Math.min(5, 1 + Math.floor(G.combo / 8));

/* ================= THE GAMES ================= */
// Each game owns hazard generation (seeded), per-frame movement + collision,
// and hazard rendering. Steering, coins, boosts, hearts, scoring, fog, HUD,
// and the duel board are shared. modName/modDesc reskin the daily twist ids
// that mean something different per game.
const GAMES = {
  gauntlet: {
    name: "THE GAUNTLET",
    howto: "dodge the walls, thread the gaps",
    modName: {}, modDesc: {},   // global twist labels already fit
    reset() {
      // Pre-generate the whole 90s course deterministically: bars spaced by
      // time. World speed ramps 150 -> 330 px/s (before handicap). Mod effects
      // apply AFTER each rng draw so the draw sequence stays stable.
      let y = -80;
      const totalDist = avgCourseSpeed() * RUN_SECS * 1.15;
      while (y > -totalDist) {
        // HARD: gaps tighten, bars pack closer, and more walls slide as the
        // run gets deep -- the last third should feel like threading needles.
        const depth = Math.min(1, -y / totalDist);
        const late = HARD() ? 1 - 0.30 * depth : 1;
        let gapW = (96 + G.rng() * 70 * (depth < .3 ? 1.4 : 1)) * late;
        if (G.mod === "squeeze") gapW *= 0.8;
        const gapX = 24 + G.rng() * (W - 48 - gapW);
        const driftFrom = G.mod === "drift" ? 2 : 8;
        const driftChance = G.mod === "drift" ? 1.01 : (HARD() ? 0.3 + 0.35 * depth : 0.3);
        const drift = (G.barCount > driftFrom && G.rng() < driftChance) ? (G.rng() < .5 ? -1 : 1) * (26 + G.rng()*30) : 0;
        G.obstacles.push({ y, gapX, gapW, drift, phase: G.rng() * Math.PI * 2, passed: false });
        if (G.rng() < (G.mod === "rush" ? 0.92 : 0.6)) {
          const cxm = gapX + gapW / 2;
          for (let i = 0; i < 3; i++)
            G.coinDots.push({ y: y - 40 - i * 34, x: cxm + (G.rng() - .5) * 50, got: false });
        }
        G.barCount++;
        y -= (120 + G.rng() * 90) * (HARD() ? 1 - 0.18 * depth : 1);
      }
    },
    update(dt, py, vs) {
      for (const o of G.obstacles) o.y += vs;
      for (const o of G.obstacles) if (o.drift) {
        o.gapX += Math.sin(G.t * 1.6 + o.phase) * o.drift * dt;
        o.gapX = Math.max(10, Math.min(W - 10 - o.gapW, o.gapX));
      }
      if (G.inv <= 0) for (const o of G.obstacles) {
        if (Math.abs(o.y - py) < 12) {
          const inGap = G.px > o.gapX + 10 && G.px < o.gapX + o.gapW - 10;
          if (!inGap) { takeHit(py); break; }
        }
      }
      // graze: cleared the bar hugging a gap edge
      for (const o of G.obstacles) {
        if (o.passed || o.y <= py + 12) continue;
        o.passed = true;
        if (G.inv > 0) continue;
        const edge = Math.min(G.px - o.gapX, o.gapX + o.gapW - G.px);
        if (edge > 0 && edge < 30) graze(G.px, py);
      }
    },
    render() {
      for (const o of G.obstacles) {
        if (o.y < -20 || o.y > H + 20) continue;
        cx.shadowColor = "#19e3ff"; cx.shadowBlur = 14;
        cx.fillStyle = "#0fbcd8";
        cx.fillRect(0, o.y - 7, o.gapX, 14);
        cx.fillRect(o.gapX + o.gapW, o.y - 7, W - o.gapX - o.gapW, 14);
        cx.shadowBlur = 0;
      }
    },
  },

  tunnel: {
    name: "TUNNEL WEAVE",
    howto: "stay inside the winding tunnel",
    modName: { drift: "WOBBLE", squeeze: "NARROW" },
    modDesc: { drift: "the tunnel sways extra", squeeze: "tighter tunnel, +250 finish bonus" },
    reset() {
      // Centerline = three layered seeded sines; walls = center +- width that
      // tightens over the run. dist 0 starts above the screen so there's a
      // grace runway before the first squeeze reaches the orb.
      const a1 = 60 + G.rng()*50, a2 = 30 + G.rng()*30, a3 = 12 + G.rng()*12;
      const p1 = G.rng()*7, p2 = G.rng()*7, p3 = G.rng()*7;
      const f1 = .0021 + G.rng()*.0008, f2 = .0052 + G.rng()*.0016, f3 = .011 + G.rng()*.004;
      const sway = G.mod === "drift" ? 1.4 : 1;
      const total = avgCourseSpeed() * RUN_SECS * 1.15;
      for (let dist = 0; dist < total; dist += 16) {
        // HARD: the tunnel sways wider as the run gets deep
        const lateSway = HARD() ? 1 + 0.35 * Math.min(dist / total, 1) : 1;
        const cxm = W/2 + sway * lateSway * (a1*Math.sin(dist*f1+p1) + a2*Math.sin(dist*f2+p2) + a3*Math.sin(dist*f3+p3)) * 0.55;
        G.path.push({ x: Math.max(70, Math.min(W - 70, cxm)) });
      }
      G.tunnelW = d => (150 - (HARD() ? 86 : 62) * Math.min(d / total, 1)) * (G.mod === "squeeze" ? 0.8 : 1);
      const step = G.mod === "rush" ? 90 : 150;
      for (let dist = 260; dist < total; dist += step + G.rng()*60) {
        const seg = G.path[Math.floor(dist/16)];
        if (seg) G.coinDots.push({ y: -dist, x: seg.x + (G.rng()-.5)*30, got: false });
      }
    },
    update(dt, py, vs) {
      G.traveled += vs;
      const dist = G.traveled - py;
      if (dist < 0 || G.inv > 0) return;
      const seg = G.path[Math.min(G.path.length - 1, Math.round(dist / 16))];
      if (!seg) return;
      const off = Math.abs(G.px - seg.x), w = G.tunnelW(dist);
      if (off > w - 12) {
        takeHit(py);
        G.targetX = seg.x;   // bounce back toward the channel
      } else if (off > w - 32) {
        // graze: riding the wall pays out every half second
        G.grazeTimer += dt;
        if (G.grazeTimer > 0.5) { G.grazeTimer = 0; graze(G.px, py, 10); }
      } else G.grazeTimer = Math.max(0, G.grazeTimer - dt * 2);
    },
    render() {
      cx.shadowColor = "#19e3ff"; cx.shadowBlur = 14;
      cx.fillStyle = "#0fbcd8";
      const Lp = [], Rp = [];
      for (let sy = -24; sy <= H + 24; sy += 16) {
        const dist = G.traveled - sy;
        if (dist < 0) { Lp.push([-40, sy]); Rp.push([W + 40, sy]); continue; }
        const seg = G.path[Math.min(G.path.length - 1, Math.round(dist / 16))] || { x: W/2 };
        const halfW = G.tunnelW(dist);
        Lp.push([seg.x - halfW, sy]); Rp.push([seg.x + halfW, sy]);
      }
      cx.beginPath(); cx.moveTo(-2, -24);
      for (const [x, y] of Lp) cx.lineTo(x, y);
      cx.lineTo(-2, H + 24); cx.closePath(); cx.fill();
      cx.beginPath(); cx.moveTo(W + 2, -24);
      for (const [x, y] of Rp) cx.lineTo(x, y);
      cx.lineTo(W + 2, H + 24); cx.closePath(); cx.fill();
      cx.shadowBlur = 0;
    },
  },

  meteor: {
    name: "METEOR STORM",
    howto: "dodge the falling rocks",
    modName: { drift: "FRENZY", squeeze: "BIG ROCKS" },
    modDesc: { drift: "way more rocks", squeeze: "huge meteors, +250 finish bonus" },
    reset() {
      // Rocks fall faster than the world scroll (each has its own multiplier),
      // so threats arrive at mixed speeds instead of as a fixed course.
      const total = avgCourseSpeed() * RUN_SECS * 1.6;
      const gap = G.mod === "drift" ? 95 : (HARD() ? 118 : 135);
      let dist = 300;
      while (dist < total) {
        G.rocks.push({
          y: -dist,
          x: 20 + G.rng() * (W - 40),
          r: (14 + G.rng() * 18) * (G.mod === "squeeze" ? 1.35 : 1),
          mul: 1 + G.rng() * (HARD() ? 0.9 : 0.7),
          vx: (G.rng() - .5) * (HARD() ? 70 : 40),
          hitDone: false, passed: false,
        });
        // HARD: the storm gets denser as the run gets deep
        dist += (gap + G.rng() * 110) * (HARD() ? 1 - 0.22 * Math.min(dist / total, 1) : 1);
      }
      const cstep = G.mod === "rush" ? 130 : 220;
      for (let d = 250; d < total; d += cstep + G.rng()*80)
        G.coinDots.push({ y: -d, x: 30 + G.rng() * (W - 60), got: false });
    },
    update(dt, py, vs) {
      for (const r of G.rocks) {
        r.y += vs * r.mul;
        r.x += r.vx * dt;
        if (r.x < r.r) { r.x = r.r; r.vx *= -1; }
        if (r.x > W - r.r) { r.x = W - r.r; r.vx *= -1; }
        if (!r.hitDone && G.inv <= 0 && Math.hypot(r.x - G.px, r.y - py) < r.r + 10) {
          r.hitDone = true; takeHit(py);
        }
        // graze: rock slipped past close enough to feel the wind
        if (!r.passed && r.y > py + r.r) {
          r.passed = true;
          if (!r.hitDone && G.inv <= 0 && Math.abs(r.x - G.px) < r.r + 42) graze(G.px, py);
        }
      }
    },
    render() {
      for (const r of G.rocks) {
        if (r.y < -40 || r.y > H + 40) continue;
        cx.shadowColor = "#19e3ff"; cx.shadowBlur = 12;
        cx.fillStyle = "#0fbcd8";
        cx.beginPath(); cx.arc(r.x, r.y, r.r, 0, 7); cx.fill();
        cx.shadowBlur = 0;
        cx.fillStyle = "rgba(7,6,15,.35)";   // crater shading
        cx.beginPath(); cx.arc(r.x - r.r*.3, r.y - r.r*.25, r.r*.45, 0, 7); cx.fill();
      }
    },
  },

  laser: {
    name: "LASER GRID",
    howto: "lasers swap sides -- pass on the dark side",
    modName: { drift: "STROBE", squeeze: "THICK BEAMS" },
    modDesc: { drift: "beams swap twice as fast", squeeze: "fat beams, +250 finish bonus" },
    reset() {
      // Each row is a full-width beam split at a pivot: one side fires while
      // the other is dark, swapping on its own seeded rhythm. Steering gets
      // you to a side; TIMING gets you through alive -- the skill the other
      // three games don't have. The dark side telegraphs the swap by
      // flickering as its window closes.
      const total = avgCourseSpeed() * RUN_SECS * 1.15;
      const thick = G.mod === "squeeze" ? 13 : 8;
      let y = -300;
      while (y > -total) {
        const depth = Math.min(1, -y / total);
        G.beams.push({
          y,
          split: 90 + G.rng() * (W - 180),
          period: (1.7 + G.rng() * 1.4) * (G.mod === "drift" ? 0.55 : 1) * (1 - 0.25 * depth),
          phase: G.rng() * Math.PI * 2,
          thick, passed: false,
        });
        if (G.rng() < (G.mod === "rush" ? 0.9 : 0.55)) {
          const b = G.beams[G.beams.length - 1];
          G.coinDots.push({ y: y - 64, x: b.split + (G.rng() - .5) * 44, got: false });
        }
        y -= (155 + G.rng() * 85) * (1 - 0.18 * depth);
      }
    },
    // sin > 0 -> LEFT side firing; the orb is safe on the dark side
    hotSide(b) { return Math.sin(G.t * 2 * Math.PI / b.period + b.phase) > 0 ? 0 : 1; },
    update(dt, py, vs) {
      for (const b of G.beams) {
        b.y += vs;
        if (Math.abs(b.y - py) < b.thick + 10 && G.inv <= 0) {
          const side = G.px < b.split ? 0 : 1;
          if (side === this.hotSide(b)) takeHit(py);
        }
        if (!b.passed && b.y > py + b.thick + 10) {
          b.passed = true;
          // graze: threaded right next to the pivot node
          if (G.inv <= 0 && Math.abs(G.px - b.split) < 44) graze(G.px, py);
        }
      }
    },
    render() {
      for (const b of G.beams) {
        if (b.y < -20 || b.y > H + 20) continue;
        const s = Math.sin(G.t * 2 * Math.PI / b.period + b.phase);
        const hot = s > 0 ? 0 : 1;
        const closing = Math.abs(s) < 0.3;   // dark side about to flip
        const seg = [[0, b.split], [b.split, W]];
        for (let i = 0; i < 2; i++) {
          const [x0, x1] = seg[i];
          if (i === hot) {
            cx.shadowColor = "#ff3355"; cx.shadowBlur = 16;
            cx.fillStyle = "#ff3355";
            cx.fillRect(x0, b.y - b.thick, x1 - x0, b.thick * 2);
            cx.shadowBlur = 0;
          } else {
            cx.globalAlpha = closing && Math.floor(G.t * 14) % 2 === 0 ? 0.5 : 0.16;
            cx.fillStyle = "#ff3355";
            cx.fillRect(x0, b.y - 1.5, x1 - x0, 3);
            cx.globalAlpha = 1;
          }
        }
        // pivot node + edge emitters
        cx.shadowColor = "#19e3ff"; cx.shadowBlur = 10;
        cx.fillStyle = "#0fbcd8";
        for (const ex of [4, b.split, W - 4]) {
          cx.beginPath(); cx.arc(ex, b.y, 5, 0, 7); cx.fill();
        }
        cx.shadowBlur = 0;
      }
    },
  },
};

function takeHit(py) {
  G.hearts--; G.inv = 1.2; G.shake = 14;
  if (G.combo >= 8) floatText(G.px, py - 30, "COMBO LOST", "#ff2ea6");
  G.combo = 0;
  burst(G.px, py, "#ff2ea6");
  if (navigator.vibrate) navigator.vibrate(80);
  if (G.hearts <= 0) endRun(true);
}

// Near-miss reward: skimming a hazard without touching it pays points.
// Each game decides what counts as a graze; the payout and juice live here.
function graze(x, y, pts = 15) {
  if (!HARD()) return;   // scoring mechanics flip on with the Jul 15 tuning
  G.grazePts += pts; G.grazes++;
  floatText(x, y, "GRAZE +" + pts, "#19e3ff");
}
function floatText(x, y, txt, color) {
  G.floaters.push({ x: Math.max(40, Math.min(W - 40, x)), y, txt, color, life: 0.9 });
}

function courseReset(playerCfg, boost) {
  G.rng = mulberry32(seedFromDate(today()));           // same course for everyone
  G.mod = todayMod().id;                               // same twist for everyone
  G.game = weekGame();                                 // same game all week
  G.t = 0; G.px = W/2; G.targetX = W/2;
  G.hearts = boost === "shield" ? 4 : 3;
  G.inv = 0; G.shake = 0; G.coins = 0; G.finished = false;
  G.obstacles = []; G.coinDots = []; G.sparks = []; G.rocks = []; G.path = [];
  G.floaters = []; G.beams = [];
  G.combo = 0; G.bestCombo = 0; G.coinPts = 0;
  G.grazePts = 0; G.grazes = 0; G.grazeTimer = 0;
  G.traveled = 0;
  G.speedScale = playerCfg.speed; G.mult = playerCfg.mult;
  G.boost = boost; G.slow = boost === "slowmo" ? 0.9 : 1; G.magnet = boost === "magnet";
  G.barCount = 0;
  G.game.reset();
}
// Ramp went 150->330 for the launch weeks; the family called it too easy
// (2026-07-14), so it now hits 420 by the end and the courses tighten late.
// HARD gates the whole difficulty+scoring pass to a day boundary: runs were
// already on today's board when this shipped, and mixing tunings inside one
// day breaks same-course-for-everyone. Safe to strip the gate after Jul 15.
const HARD = () => today() >= "20260715";
function avgCourseSpeed(){ return HARD() ? (160 + 420) / 2 : (150 + 330) / 2; }
function worldSpeed() {
  const ramp = HARD()
    ? 160 + (420 - 160) * Math.min(G.t / RUN_SECS, 1)
    : 150 + (330 - 150) * Math.min(G.t / RUN_SECS, 1);
  return ramp * G.speedScale * G.slow * (G.mod === "turbo" ? 1.15 : 1);
}

function startRun() {
  const p = ROSTER.find(r => r.id === store.player);
  courseReset(p, G.pickedBoost || "shield");
  show("game");
  G.running = true; G.lastTs = performance.now();
  requestAnimationFrame(loop);
}

function endRun(died) {
  G.running = false;
  const survived = Math.min(G.t, RUN_SECS);
  const finishBonus = died ? 0 : 250 + (G.hearts * 50) + (G.mod === "squeeze" ? 250 : 0);
  // coinPts already carries rush doubling + combo tiers per pickup
  let raw = G.coinPts + G.grazePts + Math.floor(survived) * 2 + finishBonus;
  if (G.mod === "turbo") raw *= 1.25;
  const score = Math.round(raw * G.mult);
  const runs = runsUsed() + 1;
  store.day("runs", String(runs));
  const prev = bestToday();
  const isBest = score > prev;
  if (isBest) store.day("best", String(score));
  document.getElementById("resScore").textContent = score.toLocaleString();
  document.getElementById("newBest").classList.toggle("hidden", !isBest);
  document.getElementById("resDetail").innerHTML =
    `${G.coins} coins ${G.coinPts}` +
    (G.bestCombo >= 8 ? ` (best combo ${G.bestCombo})` : "") +
    (G.grazes ? ` &nbsp;+&nbsp; ${G.grazes} grazes ${G.grazePts}` : "") +
    ` &nbsp;+&nbsp; ${Math.floor(survived)}s survived &times; 2` +
    (finishBonus ? ` &nbsp;+&nbsp; finish ${finishBonus}` : " &nbsp;// down before the end") +
    (G.mod === "turbo" ? " &nbsp;&times; 1.25 turbo" : "") +
    `<br>best today: ${Math.max(score, prev).toLocaleString()} &nbsp;//&nbsp; run ${runs} of ${MAX_RUNS}`;
  document.getElementById("resDate").textContent = `${dateLabel()} // ${G.game.name} // ${modDisplay().name}`;
  document.getElementById("againBtn").disabled = runs >= MAX_RUNS;
  document.getElementById("againBtn").textContent = runs >= MAX_RUNS ? "NO RUNS LEFT" : "RUN AGAIN";
  show("results");
  syncScore(Math.max(score, prev), runs).then(() => refreshBoards());
}

function loop(ts) {
  if (!G.running) return;
  const dt = Math.min((ts - G.lastTs) / 1000, 0.05);
  G.lastTs = ts; G.t += dt;
  if (G.t >= RUN_SECS) { G.finished = true; endRun(false); return; }

  // steer: lerp toward target; held arrow keys glide instead of stepping
  const mdir = G.mod === "mirror" ? -1 : 1;
  if (keys.ArrowLeft || keys.a) G.targetX -= 300 * dt * mdir;
  if (keys.ArrowRight || keys.d) G.targetX += 300 * dt * mdir;
  G.targetX = Math.max(14, Math.min(W - 14, G.targetX));
  G.px += (G.targetX - G.px) * Math.min(1, dt * 12);
  G.px = Math.max(14, Math.min(W - 14, G.px));

  const vs = worldSpeed() * dt;
  const py = H * 0.78;
  for (const c of G.coinDots) c.y += vs;

  // hazards: the week's game moves its own obstacles and calls takeHit()
  if (G.inv > 0) G.inv -= dt;
  G.game.update(dt, py, vs);
  if (!G.running) return;   // takeHit drained the last heart mid-update
  // coins: everyone gets a small pull so near-misses still collect (the
  // finger covers the orb on a phone -- exact alignment shouldn't be the
  // skill); the MAGNET boost is the same idea with real range.
  // MAGNET pull must always beat the world scroll, or a coin that slips past
  // gets dragged away mid-pull and never arrives (Felix, 2026-07-12): its pull
  // is world speed plus a real closing speed, so caught means collected.
  const pullR = G.magnet ? 110 : 42;
  const pullV = G.magnet ? worldSpeed() + 230 : 170;
  for (const c of G.coinDots) {
    if (c.got) continue;
    const dx = G.px - c.x, dy = py - c.y, d = Math.hypot(dx, dy);
    if (d > 0 && d < pullR) { c.x += dx / d * pullV * dt; c.y += dy / d * pullV * dt; }
    if (d < 24) {
      c.got = true; G.coins++; burst(c.x, c.y, "#ffc93c");
      // combo: unbroken coin chains tier up the coin value (x2 at 8, x3 at
      // 16... capped x5); one hit resets the chain. Greed is the skill.
      G.combo++; G.bestCombo = Math.max(G.bestCombo, G.combo);
      const tier = HARD() ? comboTier() : 1;
      G.coinPts += (G.mod === "rush" ? 20 : 10) * tier;
      if (HARD() && G.combo >= 8 && G.combo % 8 === 0 && tier > 1)
        floatText(c.x, c.y - 20, "COMBO x" + tier, "#ffc93c");
    }
  }
  draw(py);
  requestAnimationFrame(loop);
}

function burst(x, y, color) {
  for (let i = 0; i < 10; i++)
    G.sparks.push({ x, y, vx: (Math.random()-.5)*260, vy: (Math.random()-.5)*260, life: .5, color });
}

function draw(py) {
  cx.clearRect(0, 0, W, H);
  const sx = (Math.random()-.5) * G.shake, sy = (Math.random()-.5) * G.shake;
  if (G.shake > 0) G.shake = Math.max(0, G.shake - 60 * 0.016);
  cx.save(); cx.translate(sx, sy);

  // grid backdrop
  cx.strokeStyle = "rgba(25,227,255,.07)"; cx.lineWidth = 1;
  const off = (G.t * 60) % 40;
  for (let y = -40 + off; y < H; y += 40) { cx.beginPath(); cx.moveTo(0, y); cx.lineTo(W, y); cx.stroke(); }
  for (let x = 0; x <= W; x += 40) { cx.beginPath(); cx.moveTo(x, 0); cx.lineTo(x, H); cx.stroke(); }

  // hazards: the week's game draws its own obstacles
  G.game.render(py);
  // coins
  for (const c of G.coinDots) {
    if (c.got || c.y < -20 || c.y > H + 20) continue;
    cx.shadowColor = "#ffc93c"; cx.shadowBlur = 12;
    cx.fillStyle = "#ffc93c";
    cx.beginPath(); cx.arc(c.x, c.y, 7, 0, 7); cx.fill();
    cx.shadowBlur = 0;
  }
  // sparks
  for (let i = G.sparks.length - 1; i >= 0; i--) {
    const s = G.sparks[i];
    s.life -= 0.016; if (s.life <= 0) { G.sparks.splice(i, 1); continue; }
    s.x += s.vx * 0.016; s.y += s.vy * 0.016;
    cx.globalAlpha = s.life * 2; cx.fillStyle = s.color;
    cx.fillRect(s.x - 2, s.y - 2, 4, 4); cx.globalAlpha = 1;
  }
  // floating score text (graze, combo tiers)
  cx.font = "bold 12px Menlo, monospace"; cx.textAlign = "center";
  for (let i = G.floaters.length - 1; i >= 0; i--) {
    const f = G.floaters[i];
    f.life -= 0.016; if (f.life <= 0) { G.floaters.splice(i, 1); continue; }
    f.y -= 34 * 0.016;
    cx.globalAlpha = Math.min(1, f.life * 1.6); cx.fillStyle = f.color;
    cx.fillText(f.txt, f.x, f.y); cx.globalAlpha = 1;
  }
  // player orb
  const blink = G.inv > 0 && Math.floor(G.t * 12) % 2 === 0;
  if (!blink) {
    cx.shadowColor = "#ff2ea6"; cx.shadowBlur = 22;
    cx.fillStyle = "#ff2ea6";
    cx.beginPath(); cx.arc(G.px, py, 12, 0, 7); cx.fill();
    cx.fillStyle = "#fff";
    cx.beginPath(); cx.arc(G.px, py, 5, 0, 7); cx.fill();
    cx.shadowBlur = 0;
  }
  // FOG day: the world only exists near your orb.
  if (G.mod === "fog") {
    const g = cx.createRadialGradient(G.px, py, 95, G.px, py, 240);
    g.addColorStop(0, "rgba(7,6,15,0)");
    g.addColorStop(1, "rgba(7,6,15,0.97)");
    cx.fillStyle = g;
    cx.fillRect(0, 0, W, H);
  }
  cx.restore();

  // HUD
  cx.fillStyle = "#e8e6ff"; cx.font = "bold 15px Menlo, monospace"; cx.textAlign = "left";
  cx.fillText("♥".repeat(Math.max(0, G.hearts)), 12, 26);
  cx.textAlign = "center";
  const tier = HARD() ? comboTier() : 1;
  cx.fillStyle = "#ffc93c";
  cx.fillText(String(G.coins) + (tier > 1 ? "  x" + tier : ""), W/2, 26);
  cx.textAlign = "right";
  const left = Math.max(0, RUN_SECS - G.t);
  cx.fillStyle = left < 10 ? "#ff2ea6" : "#8a86b8";
  cx.fillText(Math.ceil(left) + "s", W - 12, 26);
}

/* ================= INPUT ================= */
function pointerX(e) {
  const r = cv.getBoundingClientRect();
  const clientX = (e.touches ? e.touches[0].clientX : e.clientX);
  return (clientX - r.left) / r.width * W;
}
// Touch steers RELATIVE to where the drag started: the orb moves by your
// finger's delta, from wherever the orb already is. Absolute follow made the
// finger cover the orb and stop-points never felt lined up with the coins
// (Felix, 2026-07-12). Slight >1 sensitivity so a thumb can sweep full width.
let touchAnchorX = null, orbAnchorX = null;
cv.addEventListener("touchstart", e => {
  if (!G.running) return;
  touchAnchorX = pointerX(e); orbAnchorX = G.px;
  e.preventDefault();
}, {passive:false});
cv.addEventListener("touchmove", e => {
  if (!G.running || touchAnchorX === null) return;
  const flip = G.mod === "mirror" ? -1 : 1;
  G.targetX = orbAnchorX + (pointerX(e) - touchAnchorX) * 1.2 * flip;
  e.preventDefault();
}, {passive:false});
cv.addEventListener("touchend", () => { touchAnchorX = null; });
// Desktop cursor is visible, so absolute follow stays right for the mouse.
cv.addEventListener("mousemove",  e => {
  if (!G.running) return;
  G.targetX = G.mod === "mirror" ? W - pointerX(e) : pointerX(e);
});
const keys = {};
addEventListener("keydown", e => { keys[e.key] = true; });
addEventListener("keyup",   e => { keys[e.key] = false; });

/* ================= FIRESTORE SYNC (REST, no SDK) ================= */
const fsBase = () => CFG.firebase
  ? `https://firestore.googleapis.com/v1/projects/${CFG.firebase.projectId}/databases/(default)/documents`
  : null;

async function syncScore(best, runs) {
  if (!fsBase() || !store.room) {
    toast("score not synced -- open the game from the family link");
    return;
  }
  const url = `${fsBase()}/rooms/${encodeURIComponent(store.room)}/days/${today()}` +
    `?updateMask.fieldPaths=scores.${store.player}&key=${CFG.firebase.apiKey}`;
  const body = { fields: { scores: { mapValue: { fields: {
    [store.player]: { mapValue: { fields: {
      score: { integerValue: String(best) },
      runs:  { integerValue: String(runs) },
      boost: { stringValue: G.boost || "" },
      ts:    { integerValue: String(Date.now()) },
    }}}
  }}}}};
  try {
    const r = await fetch(url, { method: "PATCH", headers: {"Content-Type":"application/json"}, body: JSON.stringify(body) });
    if (!r.ok) throw new Error(await r.text());
  } catch (e) { toast("offline -- score saved on this phone, will sync next run"); }
}

async function fetchDays(n) {
  if (!fsBase() || !store.room) return {};
  const names = [];
  for (let i = 0; i < n; i++) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const ds = `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}`;
    names.push(`projects/${CFG.firebase.projectId}/databases/(default)/documents/rooms/${store.room}/days/${ds}`);
  }
  try {
    const r = await fetch(`https://firestore.googleapis.com/v1/projects/${CFG.firebase.projectId}/databases/(default)/documents:batchGet?key=${CFG.firebase.apiKey}`,
      { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({ documents: names }) });
    if (!r.ok) return {};
    const out = {};
    for (const item of await r.json()) {
      if (!item.found) continue;
      const day = item.found.name.split("/").pop();
      const scores = item.found.fields?.scores?.mapValue?.fields || {};
      out[day] = {};
      for (const [pid, v] of Object.entries(scores)) {
        const f = v.mapValue?.fields || {};
        out[day][pid] = { score: parseInt(f.score?.integerValue || "0", 10), runs: parseInt(f.runs?.integerValue || "0", 10) };
      }
    }
    return out;
  } catch { return {}; }
}

/* ================= PLAYER PIN (anti-impersonation) ================= */
// First run as a player sets a 4-digit PIN; running as them again (any
// device) requires it. Cloud stores only a SHA-256 hash; a correct entry is
// remembered per device. PINs can't be changed remotely (rules deny update)
// -- forgot means Papi deletes rooms/{room}/players/{pid} in the console.
let pinVerifiedFor = null, pinResolve = null;

async function sha256(s) {
  const b = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(s));
  return [...new Uint8Array(b)].map(x => x.toString(16).padStart(2, "0")).join("");
}
async function fetchPinHash(pid) {
  if (!fsBase() || !store.room) return null;
  try {
    const r = await fetch(`${fsBase()}/rooms/${encodeURIComponent(store.room)}/players/${pid}?key=${CFG.firebase.apiKey}`);
    if (r.status === 404) return "";        // no PIN set yet
    if (!r.ok) return null;                 // can't tell -- treat as offline
    const d = await r.json();
    return d.fields?.pinHash?.stringValue || "";
  } catch { return null; }
}
async function savePinHash(pid, hash) {
  try {
    const r = await fetch(`${fsBase()}/rooms/${encodeURIComponent(store.room)}/players/${pid}?key=${CFG.firebase.apiKey}`,
      { method: "PATCH", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ fields: { pinHash: { stringValue: hash } } }) });
    return r.ok;
  } catch { return false; }
}
function promptPin(isNew) {
  return new Promise(res => {
    const from = ["home", "results"].find(id => !document.getElementById(id).classList.contains("hidden")) || "home";
    const name = ROSTER.find(r => r.id === store.player)?.name || "";
    document.getElementById("pinPrompt").textContent = isNew ? "SET YOUR SECRET 4-DIGIT PIN" : "ENTER YOUR 4-DIGIT PIN";
    document.getElementById("pinLabel").textContent = `${name} // ONLY YOU SHOULD KNOW IT`;
    document.getElementById("pinGo").textContent = isNew ? "LOCK IT IN" : "UNLOCK";
    document.getElementById("pinInput").value = "";
    show("pingate");
    setTimeout(() => document.getElementById("pinInput").focus(), 50);
    pinResolve = v => { show(from); if (from === "home") renderHome(); res(v); };
  });
}
document.getElementById("pinGo").onclick = () => {
  const v = document.getElementById("pinInput").value.trim();
  if (!/^\d{4}$/.test(v)) { toast("4 digits, numbers only"); return; }
  const r = pinResolve; pinResolve = null; r && r(v);
};
document.getElementById("pinCancel").onclick = () => { const r = pinResolve; pinResolve = null; r && r(null); };

async function ensurePin(pid) {
  if (!pid) return false;
  if (pinVerifiedFor === pid) return true;
  const cloud = await fetchPinHash(pid);
  if (cloud === null) { toast("can't check your PIN -- are you online?"); return false; }
  const cached = safeGet("g:pin:" + pid) || "";
  if (cloud && cached === cloud) { pinVerifiedFor = pid; return true; }
  const entered = await promptPin(cloud === "");
  if (entered === null) return false;
  const hash = await sha256(store.room + "|" + pid + "|" + entered);
  if (cloud === "") {
    if (!(await savePinHash(pid, hash))) { toast("couldn't save the PIN -- try again"); return false; }
    safeSet("g:pin:" + pid, hash); pinVerifiedFor = pid;
    toast("PIN locked in -- don't tell your brothers");
    return true;
  }
  if (hash === cloud) { safeSet("g:pin:" + pid, hash); pinVerifiedFor = pid; return true; }
  toast("wrong PIN");
  return false;
}

/* ================= LEADERBOARD ================= */
async function refreshBoards() {
  const days = await fetchDays(14);
  const t = days[today()] || {};
  // fold in local best in case sync failed
  if (store.player && bestToday() > (t[store.player]?.score || 0))
    t[store.player] = { score: bestToday(), runs: runsUsed() };
  days[today()] = t;
  renderBoard("board", t); renderBoard("board2", t);
  renderStreak(days);
  renderWeek(days);
}

/* ================= WEEKLY CHAMPION ================= */
// The week runs Mon-Sun; a player's weekly total is the sum of their daily
// bests. Sunday night's leader is champion, crowned on the home screen all
// the following week (and pushed through Alfred Monday morning).
const dstr = d => `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}`;
function mondayOf(d) {
  const x = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  x.setDate(x.getDate() - (x.getDay() + 6) % 7);
  return x;
}
function weekTotals(days) {
  const curMon = mondayOf(new Date());
  const lastMon = new Date(curMon); lastMon.setDate(lastMon.getDate() - 7);
  const cur = {}, last = {};
  for (const [ds, scores] of Object.entries(days)) {
    const bucket = ds >= dstr(curMon) ? cur : (ds >= dstr(lastMon) ? last : null);
    if (!bucket) continue;
    for (const [pid, v] of Object.entries(scores))
      bucket[pid] = (bucket[pid] || 0) + (v.score || 0);
  }
  return { cur, last };
}
const rankedTotals = t => Object.entries(t)
  .map(([pid, s]) => ({ pid, name: ROSTER.find(r => r.id === pid)?.name || pid, s }))
  .sort((a, b) => b.s - a.s);
function renderWeek(days) {
  const { cur, last } = weekTotals(days);
  const curR = rankedTotals(cur), lastR = rankedTotals(last);
  const wl = document.getElementById("weekline"), cl = document.getElementById("champline");
  wl.textContent = curR.length
    ? "WEEK SO FAR: " + curR.slice(0, 3).map(r => `${r.name} ${r.s.toLocaleString()}`).join(" / ")
    : "";
  cl.textContent = lastR.length
    ? `LAST WEEK'S CHAMP: ${lastR[0].name} (${lastR[0].s.toLocaleString()})`
    : "";
}
function renderBoard(elId, scores) {
  const el = document.getElementById(elId);
  const rows = ROSTER.map(r => ({ ...r, s: scores[r.id]?.score || 0, runs: scores[r.id]?.runs || 0 }))
    .sort((a, b) => b.s - a.s);
  const max = Math.max(...rows.map(r => r.s), 1);
  el.innerHTML = rows.map(r => r.s
    ? `<div class="row"><span class="name">${r.name}</span><span class="bar-wrap"><span class="bar" style="width:${Math.round(r.s/max*100)}%"></span></span><span class="pts">${r.s.toLocaleString()}</span></div>`
    : `<div class="row empty"><span class="name">${r.name}</span><span style="flex:1">has not run yet</span></div>`
  ).join("");
}
function renderStreak(days) {
  // daily winner = top score each day; streak = consecutive days won by same player up to today
  const keys = Object.keys(days).sort().reverse();
  let winner = null, streak = 0;
  for (const k of keys) {
    const entries = Object.entries(days[k]).sort((a,b) => b[1].score - a[1].score);
    if (!entries.length) break;
    const dayWinner = entries[0][0];
    if (winner === null) { winner = dayWinner; streak = 1; }
    else if (dayWinner === winner) streak++;
    else break;
  }
  const el = document.getElementById("streakline");
  if (winner && streak > 1) {
    const nm = ROSTER.find(r => r.id === winner)?.name || winner;
    el.textContent = `${nm} is on a ${streak}-day win streak`;
  } else el.textContent = "";
}

/* ================= SHARE ================= */
async function share() {
  const days = await fetchDays(7);
  const t = days[today()] || {};
  if (store.player && bestToday() > (t[store.player]?.score || 0))
    t[store.player] = { score: bestToday(), runs: runsUsed() };
  days[today()] = t;
  const rows = ROSTER.map(r => ({ ...r, s: t[r.id]?.score || 0 })).sort((a,b) => b.s - a.s);
  const medal = ["🥇","🥈","🥉","  "];
  const lines = rows.filter(r => r.s).map((r, i) => `${medal[i]} ${r.name} ${r.s.toLocaleString()}`);
  const wk = rankedTotals(weekTotals(days).cur);
  const wkLine = wk.length ? `\n👑 week: ${wk[0].name} leads ${wk[0].s.toLocaleString()}` : "";
  const txt = `🕹 ${weekGame().name} ${dateLabel()} // ${modDisplay().name}\n${lines.join("\n")}${wkLine}\n${location.href.split("?")[0]}`;
  if (navigator.share) { try { await navigator.share({ text: txt }); return; } catch {} }
  try { await navigator.clipboard.writeText(txt); toast("copied -- paste it in the family text"); }
  catch { toast("could not copy"); }
}

/* ================= UI WIRING ================= */
function show(id) {
  for (const s of ["home", "results", "roomgate", "pingate"]) document.getElementById(s).classList.add("hidden");
  if (id !== "game") document.getElementById(id).classList.remove("hidden");
}
function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2600);
}
function modDisplay() {
  const g = weekGame(), m = todayMod();
  return { name: g.modName[m.id] || m.name, desc: g.modDesc[m.id] || m.desc };
}
function renderHome() {
  const g = weekGame();
  document.getElementById("homeDate").textContent = `${dateLabel()} // SAME COURSE FOR EVERYONE`;
  document.getElementById("homeGame").textContent = `THIS WEEK'S GAME: ${g.name} -- ${g.howto}`;
  const m = modDisplay();
  document.getElementById("homeMod").textContent = `TODAY'S TWIST: ${m.name} -- ${m.desc}`;
  const rosterEl = document.getElementById("roster");
  rosterEl.innerHTML = ROSTER.map(r =>
    `<button data-id="${r.id}" class="${store.player === r.id ? "sel" : ""}">${r.name}</button>`).join("");
  rosterEl.querySelectorAll("button").forEach(b => b.onclick = () => {
    store.player = b.dataset.id; renderHome(); refreshBoards();
  });
  const boostsEl = document.getElementById("boosts");
  boostsEl.innerHTML = BOOSTS.map(b =>
    `<button data-id="${b.id}" class="${G.pickedBoost === b.id ? "sel" : ""}">${b.name}<small>${b.desc}</small></button>`).join("");
  boostsEl.querySelectorAll("button").forEach(b => b.onclick = () => {
    G.pickedBoost = b.dataset.id; renderHome();
  });
  const used = store.player ? runsUsed() : 0;
  const canRun = store.player && G.pickedBoost && used < MAX_RUNS;
  const btn = document.getElementById("runBtn");
  btn.disabled = !canRun;
  btn.textContent = !store.player ? "PICK A PLAYER" : !G.pickedBoost ? "PICK A BOOST"
    : used >= MAX_RUNS ? "DONE FOR TODAY" : "RUN";
  document.getElementById("runsLeft").textContent = store.player
    ? `${MAX_RUNS - used} of ${MAX_RUNS} runs left today` + (bestToday() ? ` // best ${bestToday().toLocaleString()}` : "")
    : "";
}
document.getElementById("runBtn").onclick = async () => {
  if (await ensurePin(store.player)) startRun();
};
document.getElementById("againBtn").onclick = async () => {
  if (runsUsed() < MAX_RUNS && await ensurePin(store.player)) startRun();
};
document.getElementById("homeBtn").onclick = () => { renderHome(); show("home"); refreshBoards(); };
document.getElementById("shareBtn").onclick = share;
document.getElementById("roomGo").onclick = () => {
  const v = document.getElementById("roomInput").value.trim().toLowerCase();
  if (v.length < 6) { toast("that code looks too short"); return; }
  store.room = v; show("home"); renderHome(); refreshBoards();
};

/* ================= BOOT ================= */
// ?player=papa|adelina|fd|oliver|gray pre-picks the player, so each family
// member can get a link with their name already locked in.
const qp = (qs.get("player") || "").toLowerCase();
if (ROSTER.some(r => r.id === qp)) store.player = qp;
if (!store.room) { show("roomgate"); }
else { show("home"); renderHome(); refreshBoards(); }
</script>
